<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Brickon</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a2f3e;
      --accent:    #e05c2a;
      --accent-lt: #f0784a;
      --text:      #edeae4;
      --muted:     #7a7f91;
      --error-bg:  #2a1a18;
      --error:     #f08070;
      --radius:    10px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 4px;
    }

    button:hover  { background: var(--accent-lt); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">B</div>
    <span class="logo-name">Brickon</span>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="subtitle">Acceso exclusivo para personal de la empresa</p>

  <label for="email">Usuario</label>
  <input type="text" id="email" placeholder="juan.perez" autocomplete="username"/>

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

  <button id="btn-login" onclick="login()">Entrar</button>

  <div class="error-box" id="error-msg"></div>
</div>

<script>
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Si ya hay sesión activa, ir directo al dashboard
  (async () => {
    const { data: { session } } = await client.auth.getSession();
    if (session) window.location.href = "dashboard.html";
  })();

  // Dominio interno — el usuario escribe "juan.perez" y se convierte en "juan.perez@brickon.mx"
  const DOMINIO_INTERNO = "@brickon.mx";

  async function login() {
    const usuario  = document.getElementById("email").value.trim();
    const email    = usuario.includes("@") ? usuario : usuario + DOMINIO_INTERNO;
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btn-login");
    const errorBox = document.getElementById("error-msg");

    errorBox.style.display = "none";

    if (!usuario || !password) {
      showError("Por favor completa todos los campos.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';

    const { error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      showError("Usuario o contraseña incorrectos.");
      btn.disabled = false;
      btn.textContent = "Entrar";
      return;
    }

    window.location.href = "dashboard.html";
  }

  function showError(msg) {
    const box = document.getElementById("error-msg");
    box.textContent = msg;
    box.style.display = "block";
  }

  // Permitir Enter para enviar
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
</script>

</body>
</html>
